<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>건축법규 자동조회</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --danger: #f85149;
    --warning: #d29922;
    --text: #e6edf3;
    --text2: #8b949e;
    --text3: #6e7681;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 40px;
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
  }

  header .logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 600;
    color: var(--accent);
  }

  header .subtitle {
    font-size: 13px;
    color: var(--text3);
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px;
  }

  .search-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 32px;
  }

  .search-box h2 {
    font-size: 15px;
    font-weight: 500;
    color: var(--text2);
    margin-bottom: 20px;
    font-family: 'JetBrains Mono', monospace;
  }

  .input-row {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
  }

  input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--text3); }
  #address { flex: 1; }
  #area { width: 160px; }

  button {
    background: var(--accent);
    color: #0d1117;
    border: none;
    border-radius: 8px;
    padding: 12px 24px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }

  button:hover { opacity: 0.85; }
  button:active { transform: scale(0.98); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .loading {
    display: none;
    text-align: center;
    padding: 60px;
    color: var(--text2);
    font-size: 14px;
  }

  .loading .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    display: none;
    background: rgba(248, 81, 73, 0.1);
    border: 1px solid var(--danger);
    border-radius: 8px;
    padding: 16px 20px;
    color: var(--danger);
    font-size: 14px;
    margin-bottom: 20px;
  }

  .result-header {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px 28px;
    margin-bottom: 20px;
  }

  .result-header .addr {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .result-header .meta {
    font-size: 13px;
    color: var(--text2);
    font-family: 'JetBrains Mono', monospace;
  }

  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 16px;
    overflow: hidden;
  }

  .section-header {
    padding: 16px 24px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-header .num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    background: rgba(88, 166, 255, 0.1);
    padding: 2px 8px;
    border-radius: 4px;
    border: 1px solid rgba(88, 166, 255, 0.3);
  }

  .section-header .title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
  }

  .section-header .law {
    margin-left: auto;
    font-size: 11px;
    color: var(--text3);
    font-family: 'JetBrains Mono', monospace;
  }

  .section-header .law a {
    color: var(--accent);
    text-decoration: none;
  }

  .section-header .law a:hover { text-decoration: underline; }

  .section-body { padding: 20px 24px; }

  .row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }

  .row:last-child { border-bottom: none; }

  .row .check {
    color: var(--accent2);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 2px;
    flex-shrink: 0;
  }

  .row .label {
    color: var(--text2);
    width: 110px;
    flex-shrink: 0;
  }

  .row .value {
    color: var(--text);
    font-weight: 500;
    flex: 1;
  }

  .row .value.green { color: var(--accent2); }
  .row .value.blue  { color: var(--accent); }
  .row .value.warn  { color: var(--warning); }

  .row .law-ref {
    font-size: 11px;
    color: var(--text3);
    font-family: 'JetBrains Mono', monospace;
    margin-left: auto;
    flex-shrink: 0;
  }

  .row .law-ref a { color: var(--text3); text-decoration: none; }
  .row .law-ref a:hover { color: var(--accent); }

  .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }

  .tag {
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 500;
  }

  .tag.allow {
    background: rgba(63, 185, 80, 0.1);
    color: var(--accent2);
    border: 1px solid rgba(63, 185, 80, 0.3);
  }

  .tag.deny {
    background: rgba(248, 81, 73, 0.1);
    color: var(--danger);
    border: 1px solid rgba(248, 81, 73, 0.3);
  }

  .tag.neutral {
    background: rgba(88, 166, 255, 0.1);
    color: var(--accent);
    border: 1px solid rgba(88, 166, 255, 0.3);
  }

  .parking-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
  }

  .parking-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
  }

  .parking-card .use-name {
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 6px;
  }

  .parking-card .count {
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
  }

  .parking-card .count span {
    font-size: 13px;
    font-weight: 400;
    color: var(--text2);
  }

  .parking-card .std {
    font-size: 11px;
    color: var(--text3);
    margin-top: 4px;
  }

  .notice {
    font-size: 12px;
    color: var(--text3);
    padding: 12px 0 0;
    border-top: 1px solid var(--border);
    margin-top: 12px;
  }

  .big-nums {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 16px;
  }

  .big-num {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }

  .big-num .label { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
  .big-num .val {
    font-size: 26px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent2);
  }
  .big-num .val span { font-size: 14px; font-weight: 400; color: var(--text2); }
  .big-num .py { font-size: 12px; color: var(--text3); margin-top: 2px; }

  @media (max-width: 600px) {
    .input-row { flex-direction: column; }
    #area { width: 100%; }
    .big-nums { grid-template-columns: 1fr; }
    header { padding: 16px 20px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">건축법규 자동조회</div>
    <div class="subtitle">주소 입력 → 용도지역 · 건폐율 · 용적률 · 높이제한 · 주차대수 자동 분석</div>
  </div>
</header>

<div class="container">
  <div class="search-box">
    <h2>// 분석할 토지 정보를 입력하세요</h2>
    <div class="input-row">
      <input type="text" id="address" placeholder="주소 입력 (예: 대전광역시 유성구 반석동 644-4)" />
      <input type="number" id="area" placeholder="대지면적 (m²)" />
      <button onclick="analyze()" id="btn">조회하기</button>
    </div>
  </div>

  <div class="error-box" id="error"></div>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    조회 중입니다...
  </div>

  <div id="result"></div>
</div>

<script>
// ⚠️ 배포 후 Railway URL로 변경하세요
const API_URL = "https://building-law-checker-production.up.railway.app";

async function analyze() {
  const address = document.getElementById("address").value.trim();
  const areaVal = document.getElementById("area").value.trim();

  if (!address) {
    showError("주소를 입력해주세요.");
    return;
  }

  const btn = document.getElementById("btn");
  btn.disabled = true;
  document.getElementById("error").style.display = "none";
  document.getElementById("loading").style.display = "block";
  document.getElementById("result").innerHTML = "";

  try {
    const res = await fetch(API_URL + "/analyze", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        address: address,
        area: areaVal ? parseFloat(areaVal) : null
      })
    });

    const data = await res.json();

    if (data.error) {
      showError(data.error);
      return;
    }

    renderResult(data);

  } catch (e) {
    showError("서버 연결 오류가 발생했습니다. 잠시 후 다시 시도해주세요.");
  } finally {
    btn.disabled = false;
    document.getElementById("loading").style.display = "none";
  }
}

function showError(msg) {
  const el = document.getElementById("error");
  el.style.display = "block";
  el.textContent = "⚠ " + msg;
  document.getElementById("loading").style.display = "none";
}

function py(m2) {
  return (m2 / 3.3058).toFixed(1) + " 평";
}

function renderResult(data) {
  const r = data.results[0];
  let html = "";

  // 헤더
  html += `
    <div class="result-header" style="display:block">
      <div class="addr">📍 ${data.address}</div>
      <div class="meta">${data.area ? "대지면적: " + data.area + " m² (" + py(data.area) + ")" : "대지면적 미입력"}</div>
    </div>
  `;

  // 1. 용도지역
  html += section("1", "용도지역 및 지구",
    "국토계획법 제36조",
    "https://www.law.go.kr/법령/국토의계획및이용에관한법률",
    `
    <div class="row">
      <span class="check">[x]</span>
      <span class="label">용도지역</span>
      <span class="value blue">${r.용도지역}</span>
      <span class="law-ref"><a href="https://www.law.go.kr/법령/국토의계획및이용에관한법률" target="_blank">법령 보기 ↗</a></span>
    </div>
    <div class="row">
      <span class="check">[x]</span>
      <span class="label">조회출처</span>
      <span class="value">브이월드 공간정보 API</span>
      <span class="law-ref"><a href="https://www.vworld.kr" target="_blank">vworld.kr ↗</a></span>
    </div>
    `
  );

  // 2. 지구단위계획
  const districtContent = r.지구단위계획 && r.지구단위계획.length > 0
    ? r.지구단위계획.map(d => `
        <div class="row">
          <span class="check">[x]</span>
          <span class="label">구역명</span>
          <span class="value green">${d}</span>
          <span class="law-ref"><a href="https://www.law.go.kr/법령/국토의계획및이용에관한법률" target="_blank">국토계획법 제49조 ↗</a></span>
        </div>
        <div class="row">
          <span class="check"> </span>
          <span class="label"></span>
          <span class="value warn">※ 지구단위계획 구역 내 위치 — 허용용도/건폐율/용적률 완화 기준 별도 적용 가능<br>※ 해당 지자체 지구단위계획 결정(변경) 고시문 확인 필요</span>
        </div>
      `).join("")
    : `<div class="row"><span class="check">[ ]</span><span class="label">해당 없음</span><span class="value" style="color:var(--text3)">지구단위계획 구역 외 위치</span></div>`;

  html += section("2", "지구단위계획", "국토계획법 제49조", "https://www.law.go.kr/법령/국토의계획및이용에관한법률", districtContent);

  // 3. 건축 가능 규모
  let scaleContent = `
    <div class="row">
      <span class="check">[x]</span>
      <span class="label">건폐율</span>
      <span class="value green">${r.건폐율}% 이하</span>
      <span class="law-ref"><a href="https://www.law.go.kr/법령/국토의계획및이용에관한법률시행령" target="_blank">시행령 제84조 ↗</a></span>
    </div>
    <div class="row">
      <span class="check">[x]</span>
      <span class="label">용적률</span>
      <span class="value green">${r.용적률}% 이하</span>
      <span class="law-ref"><a href="https://www.law.go.kr/법령/국토의계획및이용에관한법률시행령" target="_blank">시행령 제85조 ↗</a></span>
    </div>
  `;

  if (r.최대건축면적) {
    scaleContent += `
      <div class="big-nums" style="margin-top:16px">
        <div class="big-num">
          <div class="label">최대 건축면적 (건폐율 기준)</div>
          <div class="val">${r.최대건축면적}<span> m²</span></div>
          <div class="py">${py(r.최대건축면적)} · 대지면적 × 건폐율</div>
        </div>
        <div class="big-num">
          <div class="label">최대 연면적 (용적률 기준)</div>
          <div class="val">${r.최대연면적}<span> m²</span></div>
          <div class="py">${py(r.최대연면적)} · 대지면적 × 용적률</div>
        </div>
      </div>
    `;
  }

  html += section("3", "건축 가능 규모", "국토계획법 시행령 제84·85조", "https://www.law.go.kr/법령/국토의계획및이용에관한법률시행령", scaleContent);

  // 4. 높이 제한
  if (r.높이제한) {
    const h = r.높이제한;
    html += section("4", "높이 제한 및 사선 제한", "건축법 제61조", "https://www.law.go.kr/법령/건축법", `
      <div class="row">
        <span class="check">[x]</span>
        <span class="label">절대높이</span>
        <span class="value green">${h.절대높이}</span>
        <span class="law-ref"><a href="https://www.law.go.kr/법령/건축법시행령" target="_blank">시행령 제82조 ↗</a></span>
      </div>
      <div class="row">
        <span class="check">[x]</span>
        <span class="label">일조권사선</span>
        <span class="value ${h.일조권사선 === "필요" ? "warn" : "green"}">${h.일조권사선}</span>
        <span class="law-ref"><a href="https://www.law.go.kr/법령/건축법" target="_blank">건축법 제61조 제1항 ↗</a></span>
      </div>
      <div class="row">
        <span class="check">[x]</span>
        <span class="label">도로사선</span>
        <span class="value ${h.도로사선 === "필요" ? "warn" : "green"}">${h.도로사선}</span>
        <span class="law-ref"><a href="https://www.law.go.kr/법령/건축법" target="_blank">건축법 제61조 제2항 ↗</a></span>
      </div>
      ${h.비고 ? `<div class="row"><span class="check">[x]</span><span class="label">비고</span><span class="value">${h.비고}</span></div>` : ""}
    `);
  }

  // 5. 허용용도
  if (r.허용용도.length > 0) {
    html += section("5", "허용 건축물 용도", "국토계획법 시행령 " + r.용도근거, "https://www.law.go.kr/법령/국토의계획및이용에관한법률시행령", `
      <div class="row" style="flex-direction:column; gap:10px;">
        <div style="font-size:12px; color:var(--text2)">허용</div>
        <div class="tag-list">${r.허용용도.map(u => `<span class="tag allow">✓ ${u}</span>`).join("")}</div>
      </div>
      <div class="row" style="flex-direction:column; gap:10px; margin-top:8px;">
        <div style="font-size:12px; color:var(--text2)">불허</div>
        <div class="tag-list">${r.불허용도.map(u => `<span class="tag deny">✗ ${u}</span>`).join("")}</div>
      </div>
    `);
  }

  // 6. 주차대수
  if (r.주차대수 && Object.keys(r.주차대수).length > 0) {
    const parkingCards = Object.entries(r.주차대수).map(([use, info]) => `
      <div class="parking-card">
        <div class="use-name">${use}</div>
        <div class="count">${info.대수}<span> 대</span></div>
        <div class="std">${info.기준}</div>
      </div>
    `).join("");

    html += section("6", "주차대수 산정 (최대 연면적 기준)", "주차장법 시행령 별표1", "https://www.law.go.kr/법령/주차장법시행령", `
      <div style="font-size:12px; color:var(--text2); margin-bottom:14px">최대 연면적 ${r.최대연면적} m² 기준 용도별 필요 주차대수</div>
      <div class="parking-grid">${parkingCards}</div>
    `);
  }

  html += `<div class="notice" style="padding:16px 0; color:var(--text3); font-size:12px">※ 본 결과는 참고용이며, 정확한 기준은 해당 지자체 및 관련 조례 확인이 필요합니다.</div>`;

  document.getElementById("result").innerHTML = html;
}

function section(num, title, law, lawUrl, content) {
  return `
    <div class="section">
      <div class="section-header">
        <span class="num">## ${num}</span>
        <span class="title">${title}</span>
        <span class="law"><a href="${lawUrl}" target="_blank">${law} ↗</a></span>
      </div>
      <div class="section-body">${content}</div>
    </div>
  `;
}

document.getElementById("address").addEventListener("keydown", e => {
  if (e.key === "Enter") analyze();
});
</script>
</body>
</html>
