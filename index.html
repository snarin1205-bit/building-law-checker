<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>건축법규 자동조회</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --danger: #f85149;
    --warning: #d29922;
    --text: #e6edf3;
    --text2: #8b949e;
    --text3: #6e7681;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; }
  header { border-bottom: 1px solid var(--border); padding: 20px 40px; background: var(--surface); }
  header .logo { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 600; color: var(--accent); }
  header .subtitle { font-size: 13px; color: var(--text3); margin-top: 4px; }
  .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
  .search-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 28px; margin-bottom: 32px; }
  .search-box h2 { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 20px; font-family: 'JetBrains Mono', monospace; }
  .input-row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
  input, select { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; color: var(--text); font-family: 'Noto Sans KR', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; }
  input:focus, select:focus { border-color: var(--accent); }
  input::placeholder { color: var(--text3); }
  #address { flex: 1; min-width: 200px; }
  #area { width: 150px; }
  .plan-box { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-top: 12px; }
  .plan-box .plan-title { font-size: 12px; color: var(--text2); margin-bottom: 12px; font-family: 'JetBrains Mono', monospace; }
  .plan-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
  button { background: var(--accent); color: #0d1117; border: none; border-radius: 8px; padding: 12px 24px; font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; white-space: nowrap; }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-row { display: flex; gap: 10px; margin-top: 16px; }
  .loading { display: none; text-align: center; padding: 60px; color: var(--text2); font-size: 14px; }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box { display: none; background: rgba(248,81,73,0.1); border: 1px solid var(--danger); border-radius: 8px; padding: 16px 20px; color: var(--danger); font-size: 14px; margin-bottom: 20px; }
  .stage { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 20px; overflow: hidden; }
  .stage-header { padding: 16px 24px; background: var(--surface2); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .stage-badge { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent); background: rgba(88,166,255,0.1); padding: 3px 10px; border-radius: 4px; border: 1px solid rgba(88,166,255,0.3); }
  .stage-title { font-size: 15px; font-weight: 700; }
  .section { padding: 20px 24px; border-bottom: 1px solid var(--border); }
  .section:last-child { border-bottom: none; }
  .sec-title { font-size: 13px; font-weight: 700; color: var(--accent); font-family: 'JetBrains Mono', monospace; margin-bottom: 14px; }
  .row { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(48,54,61,0.5); font-size: 14px; }
  .row:last-child { border-bottom: none; }
  .check { color: var(--accent2); font-family: 'JetBrains Mono', monospace; font-size: 11px; margin-top: 2px; flex-shrink: 0; width: 20px; }
  .label { color: var(--text2); width: 100px; flex-shrink: 0; font-size: 13px; }
  .value { flex: 1; font-weight: 500; }
  .value.green { color: var(--accent2); }
  .value.blue { color: var(--accent); }
  .value.warn { color: var(--warning); }
  .value.red { color: var(--danger); }
  .law-ref { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; margin-left: auto; flex-shrink: 0; }
  .law-ref a { color: var(--text3); text-decoration: none; }
  .law-ref a:hover { color: var(--accent); }
  .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag { font-size: 12px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
  .tag.allow { background: rgba(63,185,80,0.1); color: var(--accent2); border: 1px solid rgba(63,185,80,0.3); }
  .tag.deny { background: rgba(248,81,73,0.1); color: var(--danger); border: 1px solid rgba(248,81,73,0.3); }
  .big-nums { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; margin: 12px 0; }
  .big-num { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
  .big-num .bn-label { font-size: 11px; color: var(--text2); margin-bottom: 6px; }
  .big-num .bn-val { font-size: 22px; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: var(--accent2); }
  .big-num .bn-val span { font-size: 13px; font-weight: 400; color: var(--text2); }
  .big-num .bn-py { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .parking-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); gap: 10px; }
  .parking-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
  .parking-card .pc-name { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .parking-card .pc-count { font-size: 20px; font-weight: 700; color: var(--accent); font-family: 'JetBrains Mono', monospace; }
  .parking-card .pc-count span { font-size: 12px; font-weight: 400; color: var(--text2); }
  .parking-card .pc-std { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .result-header { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; margin-bottom: 20px; }
  .result-header .addr { font-size: 18px; font-weight: 700; }
  .result-header .meta { font-size: 13px; color: var(--text2); margin-top: 6px; font-family: 'JetBrains Mono', monospace; }
  .ok-row { color: var(--accent2); }
  .ng-row { color: var(--danger); }
  .warn-row { color: var(--warning); }
  .notice { font-size: 12px; color: var(--text3); padding: 16px 24px; }
  @media(max-width:600px) { .input-row { flex-direction: column; } #area { width: 100%; } .big-nums { grid-template-columns: 1fr; } header { padding: 16px 20px; } }
</style>
</head>
<body>

<header>
  <div class="logo">건축법규 자동조회</div>
  <div class="subtitle">주소 입력 → 토지 법규 현황 분석 + 계획 건물 법규 검토</div>
</header>

<div class="container">
  <div class="search-box">
    <h2>// 토지 정보</h2>
    <div class="input-row">
      <input type="text" id="address" placeholder="주소 입력 (예: 대전광역시 유성구 반석동 644-4)" />
      <input type="number" id="area" placeholder="대지면적 (m²)" />
      <button onclick="analyze()" id="btn">조회하기</button>
    </div>
    <div class="plan-box">
      <div class="plan-title">// 계획 건물 정보 (선택입력 - 입력시 2단계 법규검토 실행)</div>
      <div class="plan-grid">
        <input type="text"   id="p_use"       placeholder="주용도 (예: 공동주택)" />
        <input type="number" id="p_bc"        placeholder="건축면적 (m²)" />
        <input type="number" id="p_far"       placeholder="연면적 (m²)" />
        <input type="number" id="p_height"    placeholder="건물높이 (m)" />
        <input type="number" id="p_floor_up"  placeholder="지상층수" />
        <input type="number" id="p_floor_down"placeholder="지하층수" />
        <input type="number" id="p_road"      placeholder="접도폭원 (m)" />
        <input type="number" id="p_parking"   placeholder="계획주차대수 (대)" />
      </div>
    </div>
  </div>

  <div class="error-box" id="error"></div>
  <div class="loading" id="loading"><div class="spinner"></div>조회 중입니다...</div>
  <div id="result"></div>
</div>

<script>
// ★ API_URL을 빈 문자열로 설정 → 같은 서버에서 호출
const API_URL = "";

function py(m2) { return (m2 / 3.3058).toFixed(1) + "평"; }

async function analyze() {
  const address = document.getElementById("address").value.trim();
  const areaVal = document.getElementById("area").value.trim();
  if (!address) { showError("주소를 입력해주세요."); return; }

  const plan = {};
  if (document.getElementById("p_use").value)         plan["주용도"]       = document.getElementById("p_use").value;
  if (document.getElementById("p_bc").value)          plan["건축면적"]     = parseFloat(document.getElementById("p_bc").value);
  if (document.getElementById("p_far").value)         plan["연면적"]       = parseFloat(document.getElementById("p_far").value);
  if (document.getElementById("p_height").value)      plan["건물높이"]     = parseFloat(document.getElementById("p_height").value);
  if (document.getElementById("p_floor_up").value)    plan["지상층수"]     = parseInt(document.getElementById("p_floor_up").value);
  if (document.getElementById("p_floor_down").value)  plan["지하층수"]     = parseInt(document.getElementById("p_floor_down").value);
  if (document.getElementById("p_road").value)        plan["접도폭원"]     = parseFloat(document.getElementById("p_road").value);
  if (document.getElementById("p_parking").value)     plan["계획주차대수"] = parseInt(document.getElementById("p_parking").value);

  const btn = document.getElementById("btn");
  btn.disabled = true;
  document.getElementById("error").style.display = "none";
  document.getElementById("loading").style.display = "block";
  document.getElementById("result").innerHTML = "";

  try {
    const res = await fetch(API_URL + "/analyze", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        address,
        area: areaVal ? parseFloat(areaVal) : null,
        plan: Object.keys(plan).length > 0 ? plan : null
      })
    });
    const data = await res.json();
    if (data.error) { showError(data.error); return; }
    renderResult(data);
  } catch(e) {
    showError("서버 연결 오류가 발생했습니다. 잠시 후 다시 시도해주세요.");
  } finally {
    btn.disabled = false;
    document.getElementById("loading").style.display = "none";
  }
}

function showError(msg) {
  const el = document.getElementById("error");
  el.style.display = "block";
  el.textContent = "⚠ " + msg;
  document.getElementById("loading").style.display = "none";
}

function row(check, label, value, colorClass, lawText, lawUrl) {
  return `<div class="row">
    <span class="check">${check}</span>
    <span class="label">${label}</span>
    <span class="value ${colorClass||""}">${value}</span>
    ${lawUrl ? `<span class="law-ref"><a href="${lawUrl}" target="_blank">${lawText} ↗</a></span>` : (lawText ? `<span class="law-ref">${lawText}</span>` : "")}
  </div>`;
}

function okRow(label, value, law, lawUrl) {
  return `<div class="row ok-row"><span class="check">✅</span><span class="label">${label}</span><span class="value">${value}</span>${lawUrl ? `<span class="law-ref"><a href="${lawUrl}" target="_blank">${law} ↗</a></span>` : ""}</div>`;
}
function ngRow(label, value, law, lawUrl) {
  return `<div class="row ng-row"><span class="check">❌</span><span class="label">${label}</span><span class="value">${value}</span>${lawUrl ? `<span class="law-ref"><a href="${lawUrl}" target="_blank">${law} ↗</a></span>` : ""}</div>`;
}
function warnRow(label, value, law, lawUrl) {
  return `<div class="row warn-row"><span class="check">⚠️</span><span class="label">${label}</span><span class="value">${value}</span>${lawUrl ? `<span class="law-ref"><a href="${lawUrl}" target="_blank">${law} ↗</a></span>` : ""}</div>`;
}

function renderResult(data) {
  const r = data.results[0];
  let html = "";

  html += `<div class="result-header">
    <div class="addr">📍 ${data.address}</div>
    <div class="meta">${data.area ? "대지면적: " + data.area + " m² (" + py(data.area) + ")  |  " : ""}기준: ${r.ordinance}</div>
  </div>`;

  // ── 1단계 ──
  html += `<div class="stage">
    <div class="stage-header"><span class="stage-badge">1단계</span><span class="stage-title">토지 법규 현황 분석</span></div>`;

  // 1. 용도지역
  html += `<div class="section"><div class="sec-title">## 1. 용도지역 및 지구</div>`;
  html += row("[x]", "용도지역", r.용도지역, "blue", "국토계획법 제36조", "https://www.law.go.kr/법령/국토의계획및이용에관한법률");
  if (r.지구단위계획 && r.지구단위계획.length > 0) {
    r.지구단위계획.forEach(d => {
      html += row("[x]", "지구단위계획", d + "  ※ 별도 완화기준 적용 가능", "warn");
    });
  } else {
    html += row("[ ]", "지구단위계획", "해당 없음", "");
  }
  html += `</div>`;

  // 2. 건축 가능 규모
  html += `<div class="section"><div class="sec-title">## 2. 건축 가능 규모</div>`;
  html += row("[x]", "건폐율", r.건폐율 + "% 이하", "green", "시행령 제84조", "https://www.law.go.kr/법령/국토의계획및이용에관한법률시행령");
  html += row("[x]", "용적률", r.용적률 + "% 이하", "green", "시행령 제85조", "https://www.law.go.kr/법령/국토의계획및이용에관한법률시행령");
  if (r.최대건축면적) {
    html += `<div class="big-nums">
      <div class="big-num"><div class="bn-label">최대 건축면적 (건폐율 기준)</div><div class="bn-val">${r.최대건축면적}<span> m²</span></div><div class="bn-py">${py(r.최대건축면적)}</div></div>
      <div class="big-num"><div class="bn-label">최대 연면적 (용적률 기준)</div><div class="bn-val">${r.최대연면적}<span> m²</span></div><div class="bn-py">${py(r.최대연면적)}</div></div>
    </div>`;
  }
  html += `</div>`;

  // 3. 높이 제한
  html += `<div class="section"><div class="sec-title">## 3. 높이 제한 및 사선 제한</div>`;
  html += row("[x]", "절대높이", r.절대높이 || "없음", "green", "건축법 시행령 제82조", "https://www.law.go.kr/법령/건축법시행령");
  html += row("[x]", "일조권사선", r.일조권사선 ? "필요" : "불필요", r.일조권사선 ? "warn" : "green", "건축법 제61조 제1항", "https://www.law.go.kr/법령/건축법");
  html += row("[x]", "도로사선", "필요", "warn", "건축법 제61조 제2항", "https://www.law.go.kr/법령/건축법");
  html += row("[x]", "최고층수", r.최고층수 < 999 ? r.최고층수 + "층 이하" : "제한 없음", "green");
  html += `</div>`;

  // 4. 허용 용도
  if (r.허용용도 && r.허용용도.length > 0) {
    html += `<div class="section"><div class="sec-title">## 4. 허용 건축물 용도</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:8px">근거: 국토계획법 시행령 ${r.용도근거} · <a href="https://www.law.go.kr/법령/국토의계획및이용에관한법률시행령" target="_blank" style="color:var(--accent)">법령 보기 ↗</a></div>
      <div style="margin-bottom:8px"><div style="font-size:12px;color:var(--text2);margin-bottom:6px">허용</div><div class="tag-list">${r.허용용도.map(u=>`<span class="tag allow">✓ ${u}</span>`).join("")}</div></div>
      <div><div style="font-size:12px;color:var(--text2);margin-bottom:6px">불허</div><div class="tag-list">${r.불허용도.map(u=>`<span class="tag deny">✗ ${u}</span>`).join("")}</div></div>
    </div>`;
  }

  // 5. 주차 기준
  if (r.주차기준 && Object.keys(r.주차기준).length > 0) {
    html += `<div class="section"><div class="sec-title">## 5. 주차대수 기준</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:12px">근거: 주차장법 시행령 별표1 · <a href="https://www.law.go.kr/법령/주차장법시행령" target="_blank" style="color:var(--accent)">법령 보기 ↗</a></div>
      <div class="parking-grid">${Object.entries(r.주차기준).map(([use,info])=>`
        <div class="parking-card">
          <div class="pc-name">${use}</div>
          <div class="pc-count">${info.대수}<span> 대</span></div>
          <div class="pc-std">${info.기준}</div>
        </div>`).join("")}
      </div>
    </div>`;
  }
  html += `</div>`;

  // ── 2단계 ──
  if (r.계획검토) {
    const p = r.계획검토;
    html += `<div class="stage">
      <div class="stage-header"><span class="stage-badge">2단계</span><span class="stage-title">계획 건물 법규 검토</span></div>`;

    html += `<div class="section"><div class="sec-title">## 1. 규모 검토</div>`;
    if (p.건축면적) {
      if (p.건축면적.ok) html += okRow("건축면적", `${p.건축면적.계획}m²  건폐율 ${p.건축면적.건폐율}% (허용 ${r.건폐율}% 이하)  여유 ${p.건축면적.여유}m²`, "시행령 제84조", "https://www.law.go.kr/법령/국토의계획및이용에관한법률시행령");
      else html += ngRow("건축면적", `${p.건축면적.계획}m²  건폐율 ${p.건축면적.건폐율}% (허용 ${r.건폐율}% 초과!)  ${Math.abs(p.건축면적.여유)}m² 초과`, "시행령 제84조", "https://www.law.go.kr/법령/국토의계획및이용에관한법률시행령");
    }
    if (p.연면적) {
      if (p.연면적.ok) html += okRow("연면적", `${p.연면적.계획}m²  용적률 ${p.연면적.용적률}% (허용 ${r.용적률}% 이하)  여유 ${p.연면적.여유}m²`, "시행령 제85조", "https://www.law.go.kr/법령/국토의계획및이용에관한법률시행령");
      else html += ngRow("연면적", `${p.연면적.계획}m²  용적률 ${p.연면적.용적률}% (허용 ${r.용적률}% 초과!)  ${Math.abs(p.연면적.여유)}m² 초과`, "시행령 제85조", "https://www.law.go.kr/법령/국토의계획및이용에관한법률시행령");
    }
    html += `</div>`;

    html += `<div class="section"><div class="sec-title">## 2. 높이 및 층수 검토</div>`;
    if (p.절대높이) {
      if (p.절대높이.ok) html += okRow("절대높이", `${p.절대높이.계획}m  허용: ${p.절대높이.허용} 만족`, "건축법 시행령 제82조", "https://www.law.go.kr/법령/건축법시행령");
      else html += ngRow("절대높이", `${p.절대높이.계획}m  허용: ${p.절대높이.허용} 초과!`, "건축법 시행령 제82조", "https://www.law.go.kr/법령/건축법시행령");
    } else {
      html += okRow("절대높이", "제한 없음");
    }
    if (p.층수) {
      if (p.층수.ok) html += okRow("지상층수", `${p.층수.계획}층  최고 ${p.층수.허용}${p.층수.허용 !== "제한없음" ? "층" : ""} 이하 만족`);
      else html += ngRow("지상층수", `${p.층수.계획}층  최고 ${p.층수.허용}층 초과!`);
    }
    if (p.일조권사선) {
      html += warnRow("일조권사선", `정북방향 인접대지경계선에서 최소 ${p.일조권사선.최소이격}m 이격 필요`, "건축법 제61조 제1항", "https://www.law.go.kr/법령/건축법");
    }
    if (p.도로사선) {
      if (p.도로사선.ok) html += okRow("도로사선", `건물높이 ${p.도로사선.계획높이}m  허용높이 ${p.도로사선.허용높이}m 이하 만족`, "건축법 제61조 제2항", "https://www.law.go.kr/법령/건축법");
      else html += ngRow("도로사선", `건물높이 ${p.도로사선.계획높이}m  허용높이 ${p.도로사선.허용높이}m 초과!`, "건축법 제61조 제2항", "https://www.law.go.kr/법령/건축법");
    }
    html += `</div>`;

    if (p.용도) {
      html += `<div class="section"><div class="sec-title">## 3. 용도 적합성 검토</div>`;
      if (p.용도.ok) html += okRow("주용도", `'${p.용도.계획}'  ${r.용도지역} 허용 용도`);
      else if (p.용도.상태 === "불허") html += ngRow("주용도", `'${p.용도.계획}'  ${r.용도지역} 불허 용도!`);
      else html += warnRow("주용도", `'${p.용도.계획}'  허용 여부 별도 확인 필요`);
      html += `</div>`;
    }

    if (p.주차) {
      html += `<div class="section"><div class="sec-title">## 4. 주차대수 검토</div>`;
      if (p.주차.계획 !== null && p.주차.계획 !== undefined) {
        if (p.주차.ok) html += okRow("주차대수", `계획 ${p.주차.계획}대  ≥  법정 ${p.주차.법정}대 (${p.주차.기준})  여유 ${p.주차.계획 - p.주차.법정}대`, "주차장법 시행령 별표1", "https://www.law.go.kr/법령/주차장법시행령");
        else html += ngRow("주차대수", `계획 ${p.주차.계획}대  <  법정 ${p.주차.법정}대 (${p.주차.기준})  ${p.주차.법정 - p.주차.계획}대 부족!`, "주차장법 시행령 별표1", "https://www.law.go.kr/법령/주차장법시행령");
      } else {
        html += row("[x]", "법정주차대수", `${p.주차.법정}대  (${p.주차.기준})`, "green");
      }
      html += `</div>`;
    }
    html += `</div>`;
  }

  html += `<div class="notice">※ 본 결과는 참고용이며, 정확한 기준은 해당 지자체 및 관련 조례 확인이 필요합니다.<br>※ 일조권/도로사선은 정확한 검토를 위해 배치도 검토가 필요합니다.</div>`;
  document.getElementById("result").innerHTML = html;
}

document.getElementById("address").addEventListener("keydown", e => { if (e.key === "Enter") analyze(); });
</script>
</body>
</html>
